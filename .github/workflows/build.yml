name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            name: macOS (universal)
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

          # Windows x86-64
          - platform: windows-latest
            name: Windows (x86-64)
            args: ''
            rust-targets: ''

          # Linux x86-64 — produces .deb and .AppImage
          - platform: ubuntu-22.04
            name: Linux (x86-64)
            args: ''
            rust-targets: ''

          # Linux ARM64 — produces .deb and .AppImage
          - platform: ubuntu-22.04-arm
            name: Linux (ARM64)
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install JS dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LexiChat ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `LexiChat_*_universal.dmg` |
            | Windows | `LexiChat_*_x64-setup.exe` |
            | Linux x86-64 | `lexichat_*_amd64.deb` / `LexiChat_*_amd64.AppImage` |
            | Linux ARM64 | `lexichat_*_arm64.deb` / `LexiChat_*_aarch64.AppImage` |

            See the Assets section below for all downloadable files.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
