name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Intel + Apple Silicon)
          - platform: macos-latest
            name: macOS (universal)
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

          # Windows x86-64
          - platform: windows-latest
            name: Windows (x86-64)
            args: ''
            rust-targets: ''

          # Linux x86-64 — produces .deb and .AppImage
          - platform: ubuntu-22.04
            name: Linux (x86-64)
            args: ''
            rust-targets: ''

          # Linux ARM64 — produces .deb and .AppImage
          - platform: ubuntu-22.04-arm
            name: Linux (ARM64)
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install JS dependencies
        run: npm ci

      # Build only — the release is assembled by the `release` job below, so that the
      # macOS DMG can be notarized *before* it is uploaded.
      #
      # Apple credentials are deliberately split: the certificate vars make tauri sign the
      # app, but APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID are withheld so tauri skips its own
      # notarization. Tauri's built-in notarizer fails with a spurious "HTTP 500 Internal
      # Server Error" from the Apple notary service (it blocked the macOS DMG on v1.9.6,
      # v1.9.7 and v1.9.8) while `xcrun notarytool` submits the very same bundle to the very
      # same service successfully. So we notarize with notarytool in the next step instead.
      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        with:
          args: ${{ matrix.args }}

      - name: Notarize & staple macOS DMG
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          echo "Notarizing $DMG"

          # --wait blocks until Apple returns Accepted or Invalid; a non-Accepted status
          # exits non-zero, so a rejected build fails the job rather than shipping unnotarized.
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket so the DMG validates offline, on a machine that has never
          # contacted Apple.
          xcrun stapler staple "$DMG"

          # Gatekeeper's verdict on the artefact users will actually download.
          # Expect: "accepted / source=Notarized Developer ID".
          spctl -a -vvv -t install "$DMG"

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  # Single job assembling the draft release, so the four build jobs never race to create it.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LexiChat ${{ github.ref_name }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `LexiChat_*_universal.dmg` |
            | Windows | `LexiChat_*_x64-setup.exe` |
            | Linux x86-64 | `lexichat_*_amd64.deb` / `LexiChat_*_amd64.AppImage` |
            | Linux ARM64 | `lexichat_*_arm64.deb` / `LexiChat_*_aarch64.AppImage` |

            See the Assets section below for all downloadable files.
          draft: true
          prerelease: false
          files: artifacts/**/*
